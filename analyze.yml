name: boAt Crest App Review Analyzer

on:
  workflow_dispatch:
  repository_dispatch:
    types: [gmail-trigger]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main pipeline
        run: python main.py

      - name: Send Excel via email
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python send_email.py

      - name: Upload Excel as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android_CrestApp_Review_${{ github.run_id }}
          path: Android_CrestApp_Review.xlsx
          retention-days: 90
